<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="N Eyes - Login de Acesso ao Sistema de Monitoramento de Rede">
  <title>N Eyes - Login</title>
  
</head>
<body>
  <main class="login-shell" aria-label="Página de login N Eyes">
    <section class="brand">
      <h1>N Eyes</h1>
      <p>Acesso ao Sistema</p>
    </section>

    <form class="login-form" action="home.html#dashboard" method="get" aria-label="Formulário de login">
      <div>
        <label for="username">Usuário</label>
        <input type="text" id="username" name="username" placeholder="Digite seu usuário" required>
      </div>
      <div>
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" placeholder="Digite sua senha" required>
      </div>
      <button type="submit">Entrar</button>
    </form>

    <p class="login-footer">Painel de monitoramento de rede N Eyes</p>
  </main>
</body>
</html>
