<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="N Eyes - Login de Acesso ao Sistema de Monitoramento de Rede">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/src/styles/login.css">
  <title>N Eyes - Login</title>
  <link rel="icon" href="/src/public/favicon-32x32.png" type="image/png">
  
</head>
<body>
  <main class="login-shell" aria-label="Página de login N Eyes">
    <section class="brand">
      <h1>N Eyes</h1>
      <p>Acesso ao Sistema</p>
    </section>

    <form class="login-form" id="loginForm" aria-label="Formulário de login" novalidate>
      <div>
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required autocomplete="email">
      </div>
      <div>
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" placeholder="Digite sua senha" required autocomplete="current-password">
      </div>
      <div id="loginError" class="login-error" role="alert" style="display:none;"></div>
      <button type="submit" id="loginBtn">Entrar</button>
    </form>

      <p class="login-help">
        Não tem conta? <a href="register.html">Cadastre-se</a> para acessar o painel.
      </p>

    <p class="login-footer">Painel de monitoramento de rede N Eyes</p>
  </main>

  <script>
    const API = 'http://localhost:3000/api';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errorEl = document.getElementById('loginError');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.textContent = 'Entrando...';
      errorEl.style.display = 'none';

      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Erro ao fazer login.');
        }

        localStorage.setItem('neyes_token', data.token);
        localStorage.setItem('neyes_user', JSON.stringify(data.user));
        window.location.href = 'home.html';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
