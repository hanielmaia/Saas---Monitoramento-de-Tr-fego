<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="N Eyes - Cadastro de Conta">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/src/styles/login.css">
  <title>N Eyes - Cadastro</title>
  <link rel="icon" href="/src/public/favicon-32x32.png" type="image/png">
</head>
<body>
  <main class="login-shell" aria-label="Página de cadastro N Eyes">
    <section class="brand">
      <h1>N Eyes</h1>
      <p>Crie sua conta</p>
    </section>

    <form class="login-form" action="home.html#dashboard" method="get" aria-label="Formulário de cadastro">
      <div>
        <label for="fullname">Nome completo</label>
        <input type="text" id="fullname" name="fullname" placeholder="Digite seu nome" required>
      </div>
      <div>
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>
      </div>
      <div>
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" placeholder="Crie uma senha" required>
      </div>
      <button type="submit">Cadastrar</button>

      <p class="login-help">
        Já tem conta? <a href="login.html">Faça login</a> para acessar o painel.
      </p>
    </form>

    <p class="login-footer">Painel de monitoramento de rede N Eyes</p>
  </main>
</body>
</html>
